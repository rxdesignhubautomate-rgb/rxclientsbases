services:
  - type: web
    name: rx-communication-crm
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22
      - key: ORG_ID
        value: RXDH
      - key: ORG_TIMEZONE
        value: Asia/Kolkata
      - key: AI_DEFAULT_MODE
        value: ASSIST
      - key: AI_AUTO_SEND_ENABLED
        value: "false"
      - key: ENABLE_LEGACY_DUAL_WRITE
        value: "true"
      - key: USE_NEW_CRM_READS
        value: "false"
